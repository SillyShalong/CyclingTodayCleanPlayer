name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Windows package
        shell: powershell
        run: .\build-all.ps1 -SkipAndroid

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyclingTodayCleanPlayer-windows
          path: windows/CyclingTodayCleanPlayer-windows.zip
          if-no-files-found: error
          retention-days: 30

  android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Android APK
        shell: bash
        run: |
          gradle --no-daemon -p android :app:assembleDebug
          mkdir -p android/dist
          cp android/app/build/outputs/apk/debug/app-debug.apk android/dist/CyclingTodayAndroidPlayer-debug.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyclingTodayAndroidPlayer-debug
          path: android/dist/CyclingTodayAndroidPlayer-debug.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - android
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CyclingTodayCleanPlayer-windows
          path: release

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: CyclingTodayAndroidPlayer-debug
          path: release

      - name: Create release with downloads
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release/CyclingTodayCleanPlayer-windows.zip
          release/CyclingTodayAndroidPlayer-debug.apk
          --repo "${GITHUB_REPOSITORY}"
          --generate-notes
          --title "Cycling Today Clean Player ${GITHUB_REF_NAME}"
